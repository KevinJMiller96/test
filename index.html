<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.5)), 
                url('https://example.com/your-texture-image.jpg'); /* Replace with texture image URL */
    background-size: cover;
    background-repeat: no-repeat;
    color: #FFFFFF; /* Text color */
    font-family: 'Courier New', Courier, monospace; /* Similar font style */
    overflow: hidden; /* Prevents scrolling */
}

.container {
    position: relative;
    padding: 20px; 
    border: 2px solid #0f0; /* Green border for contrast */
    border-radius: 10px; 
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); /* Glow effect */
    backdrop-filter: blur(5px); /* Slight blur for depth */
    z-index: 1; /* Ensure it sits above scanlines */
}

.scanlines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        rgba(255, 255, 255, 0.1), 
        rgba(255, 255, 255, 0.1) 1px, 
        rgba(0, 0, 0, 0.7) 1px, 
        rgba(0, 0, 0, 0.7) 4px /* Adjust for spacing */
    );
    opacity: 0.15; /* Adjust visibility of scanlines */
    pointer-events: none; /* Ensure clicks go through */
    animation: scan 5s linear infinite; /* Animation timing */
}

@keyframes scan {
    0% {
        background-position: 0% 0; /* Start at the top */
    }
    100% {
        background-position: 0% 100%; /* Move to the bottom */
    }
}
</style>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pip-Boy Background Effect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Your Content Here</h1>
        <p>Emulating the Pip-Boy Style</p>
    </div>
    <div class="scanlines"></div> <!-- Scanlines overlay -->
</body>
</html>
