<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pip-Boy Interface</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<body>

<!-- NAV -->
<div class="nav">
    <button class="active" data-page="status">STATUS</button>
    <button data-page="inventory">INVENTORY</button>
    <button data-page="radio">RADIO</button>
</div>

<div class="page-container">

<!-- STATUS PAGE -->
<div class="page active" id="status">
    <h2>STATUS</h2>

    <div class="stat-group">
        HP<br>
        <input type="range" min="0" max="100" value="100" class="slider" id="hpSlider">
        <div id="hpValue">100 / 100</div>
    </div>

    <div class="stat-group">
        RADS<br>
        <input type="range" min="0" max="100" value="0" class="slider" id="radSlider">
        <div id="radValue">0 RADS</div>
    </div>
</div>

<!-- INVENTORY -->
<div class="page" id="inventory">
    <h2>INVENTORY</h2>
    <div class="inventory-box">
        Items will go here.
    </div>
</div>

<!-- RADIO -->
<div class="page" id="radio">

	<div class="station" data-audio="/audio/fart.mp3">
   	 <div class="square"></div>
   	 Galaxy News Radio
	</div>

	<div class="station" data-audio="/audio/fart.mp3">
	    <div class="square"></div>
    		Enclave Radio
	</div>

	<div class="station" data-audio="/audio/mojave.mp3">
	    <div class="square"></div>
	    Mojave Music Radio
	</div>


</div>

<!-- WAVE -->
<div class="wave-container">
    <canvas id="waveCanvas"></canvas>
</div>

<script>
/* NAVIGATION */
const navButtons = document.querySelectorAll(".nav button");
const pages = document.querySelectorAll(".page");

navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        navButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        pages.forEach(p => p.classList.remove("active"));
        document.getElementById(btn.dataset.page).classList.add("active");
    });
});

/* STATUS SLIDERS */
const hpSlider = document.getElementById("hpSlider");
const radSlider = document.getElementById("radSlider");
const hpValue = document.getElementById("hpValue");
const radValue = document.getElementById("radValue");

hpSlider.oninput = () => hpValue.textContent = hpSlider.value + " / 100";
radSlider.oninput = () => radValue.textContent = radSlider.value + " RADS";

/* RADIO */
const stations = document.querySelectorAll(".station");

let currentStation = null;
let activeWave = false;
let currentAudio = null;

stations.forEach(station => {
    station.addEventListener("click", () => {

        // If clicking currently selected station → turn off
        if (currentStation === station) {
            station.classList.remove("selected");

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }

            currentStation = null;
            activeWave = false;
            return;
        }

        // Remove selection from others
        stations.forEach(s => s.classList.remove("selected"));
        station.classList.add("selected");

        // Stop previous audio
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        // Start new audio
        const audioFile = station.dataset.audio;
        currentAudio = new Audio(audioFile);
        currentAudio.loop = true;
        currentAudio.play();

        currentStation = station;
        activeWave = true;
    });
});

// Used by wave.js
window.isRadioActive = () => activeWave;

/* WAVEFORM */
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

let width, height;
let time = 0;

function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    width = canvas.width;
    height = canvas.height;
}
resize();
window.addEventListener("resize", resize);

function drawGrid() {
    ctx.strokeStyle = "rgba(0,255,100,0.2)";
    for (let i = 0; i < width; i += 40) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, height);
        ctx.stroke();
    }
    for (let i = 0; i < height; i += 40) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(width, i);
        ctx.stroke();
    }
}

function drawWave() {
    ctx.clearRect(0, 0, width, height);
    drawGrid();

    ctx.strokeStyle = "#00ff66";
    ctx.lineWidth = 2;
    ctx.beginPath();

    let centerY = height / 2;

    for (let x = 0; x < width; x++) {
        let y = centerY;

        if (activeWave) {
            y += Math.sin((x * 0.03) + time) * 20
               + Math.sin((x * 0.11) + time * 1.5) * 15
               + (Math.random() * 20 - 10);
        }

        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.stroke();

    if (activeWave) time += 0.08;

    requestAnimationFrame(drawWave);
}

drawWave();
</script>

</body>
</html>
