<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: black; /* Background simulating old TV */
    margin: 0;
}

.tv-screen {
    position: relative;
    width: 600px; /* Set the width of your TV screen */
    height: 400px; /* Set the height */
    overflow: hidden;
    border: 20px solid #333; /* Simulate the TV frame */
    border-radius: 15px; /* Rounded corners */
    background: #222; /* Inner TV color */
}

.content {
    position: relative;
    z-index: 2; /* Ensure content is above scanlines */
    color: white; /* Content color */
    padding: 20px;
    text-align: center;
}

.scanlines {
    position: absolute;
    top: -100%; /* Start above the screen */
    left: 0;
    width: 100%;
    height: 200%; /* Allow for movement */
    background: repeating-linear-gradient(
        rgba(255, 255, 255, 0.1), 
        rgba(255, 255, 255, 0.1) 2px, /* Increased line thickness */
        rgba(0, 0, 0, 0.7) 2px, 
        rgba(0, 0, 0, 0.7) 10px /* Increased gap */
    );
    opacity: 0.15; /* Adjust the visibility of the scanlines */
    pointer-events: none; /* Ensure clicks go through */
    transform: translateY(0); /* Start transform */
    animation: scan 2s linear infinite; /* Animation */
}

@keyframes scan {
    from {
        transform: translateY(0); /* No movement */
    }
    to {
        transform: translateY(100%); /* Slide down */
    }
}
</style>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Scanlines Effect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="scanlines">
    <div class="tv-screen">
        <div class="scanlines"></div>
        <div class="content">
            <h1>Your Content Here</h1>
            <p>This looks like an old TV.</p>
        </div>
    </div>
</body>
</html>
